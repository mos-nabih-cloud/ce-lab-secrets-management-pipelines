name: Secrets Demo
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  demonstrate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Use secret in a command (masked automatically)
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Connecting to database..."
          echo "Password value is: $DB_PASSWORD"
          echo "Notice the password above is masked as ***"
 
      - name: Show that secrets cannot be printed
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "API key: $API_KEY"
          ENCODED_API_KEY="$(printf '%s' "$API_KEY" | base64 -w 0)"
          echo "::add-mask::$ENCODED_API_KEY"
          echo "Base64 encoded API key is masked after registering it:"
          echo "$ENCODED_API_KEY"
 
      - name: Use secret as an input to another step
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "ERROR: DB_PASSWORD is empty"
            exit 1
          fi
          echo "DB_PASSWORD is set and has ${#DB_PASSWORD} characters"
 
  use-environment-secret:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Access environment-level secret
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Deploy token length: ${#DEPLOY_TOKEN}"
          echo "Environment secrets are scoped to the 'staging' environment"
          echo "Token value: $DEPLOY_TOKEN"

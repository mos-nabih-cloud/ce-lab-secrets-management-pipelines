name: AWS Secrets Manager
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
env:
  AWS_REGION: us-east-1
  SECRET_NAME: m508-secrets-lab/dev/database-credentials
 
jobs:
  retrieve-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Retrieve secret from Secrets Manager
        id: get-secret
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" \
            --query 'SecretString' \
            --output text)
 
          DB_USER=$(echo "$SECRET_JSON" | jq -r '.username')
          DB_HOST=$(echo "$SECRET_JSON" | jq -r '.host')
          DB_PORT=$(echo "$SECRET_JSON" | jq -r '.port')
          DB_NAME=$(echo "$SECRET_JSON" | jq -r '.dbname')
          DB_PASS=$(echo "$SECRET_JSON" | jq -r '.password')
 
          echo "::add-mask::$DB_PASS"
 
          echo "db_user=$DB_USER"   >> "$GITHUB_OUTPUT"
          echo "db_host=$DB_HOST"   >> "$GITHUB_OUTPUT"
          echo "db_port=$DB_PORT"   >> "$GITHUB_OUTPUT"
          echo "db_name=$DB_NAME"   >> "$GITHUB_OUTPUT"
          echo "db_pass=$DB_PASS"   >> "$GITHUB_OUTPUT"
 
      - name: Use retrieved credentials
        run: |
          echo "Database connection info:"
          echo "  Host: ${{ steps.get-secret.outputs.db_host }}"
          echo "  Port: ${{ steps.get-secret.outputs.db_port }}"
          echo "  User: ${{ steps.get-secret.outputs.db_user }}"
          echo "  DB:   ${{ steps.get-secret.outputs.db_name }}"
          echo "  Pass: ${{ steps.get-secret.outputs.db_pass }}"
          echo ""
          echo "The password above should appear as *** in the log"

  check-rotation:
    runs-on: ubuntu-latest
    needs: retrieve-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
 
      - name: Check secret rotation age
        run: |
          chmod +x scripts/check-secret-age.sh
          ./scripts/check-secret-age.sh "m508-secrets-lab/dev/database-credentials" 90
          ./scripts/check-secret-age.sh "m508-secrets-lab/dev/api-keys" 90